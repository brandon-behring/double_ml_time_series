# Dataset ledger for: Double Machine Learning for time series and panel data
# Generated 2026-05-16 (Step 8 / dataset-gather)
# Schema: ~/Claude/research_toolkit/templates/dataset_ledger.template.yml

# Dataset ledger fragment A — FRED-style macro time-series + government data
# Bucket: FRED + US/intl government statistical agencies for DML applications
# (treatment-effect estimation with confounding macro covariates, real-time vintages,
# MIDAS / mixed-frequency).
#
# Verification policy: status=verified only when name+primary_url+license were
# confirmed via WebFetch/WebSearch in the May 2026 gather pass. St. Louis Fed
# pages (fred.stlouisfed.org/alfred.stlouisfed.org/research.stlouisfed.org)
# return HTTP 403 to WebFetch — for those, verification used WebSearch result
# pages quoting the canonical landing page. Anything not crisply confirmed is
# left as unverified.

