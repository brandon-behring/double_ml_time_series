name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Lint and check formatting (ruff)
        run: |
          python -m ruff check dml_ts/ test/ examples/
          python -m ruff format --check dml_ts/ test/ examples/

      - name: Type check (mypy)
        run: python -m mypy dml_ts/ --ignore-missing-imports --no-strict-optional --explicit-package-bases

      - name: Collect tests
        run: python -m pytest --collect-only -q

      - name: Check LaTeX-MDX provenance drift
        run: python scripts/check_tex_mdx_drift.py

  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tier1 tests
        run: python -m pytest -m tier1 --timeout=10 --no-cov -v

  tier2:
    needs: tier1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tier1 + tier2 tests with coverage
        run: python -m pytest -m "tier1 or tier2" --timeout=60 --cov=dml_ts --cov-report=xml --cov-fail-under=70 -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run examples
        run: |
          for f in examples/*.py; do
            python "$f"
          done

  doctest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev,full]"

      - name: Run doctests (global)
        # Every docstring example across dml_ts/ is runnable; a global
        # --doctest-modules gate keeps them honest. MPLBACKEND=Agg runs the
        # plotting examples headless; [full] installs econml so the validation
        # modules that import it collect cleanly. Genuinely network / real-data /
        # multi-thousand-bootstrap examples carry inline `# doctest: +SKIP`.
        # Dedicated job so the econml/numpy install can't pollute lint or mypy.
        # Clear addopts (--override-ini) so the project's default pytest
        # options (-v) don't interfere with the doctest run.
        env:
          MPLBACKEND: Agg
        run: |
          python -m pytest --doctest-modules dml_ts/ --override-ini="addopts=" -q
