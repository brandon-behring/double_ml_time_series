name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Check formatting (Black)
        run: python -m black --check dml_ts/ test/ examples/

      - name: Type check (mypy)
        run: python -m mypy dml_ts/ --ignore-missing-imports --no-strict-optional --explicit-package-bases

      - name: Collect tests
        run: python -m pytest --collect-only -q

      - name: Check LaTeX-MDX provenance drift
        run: python scripts/check_tex_mdx_drift.py

  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tier1 tests
        run: python -m pytest -m tier1 --timeout=10 --no-cov -v

  tier2:
    needs: tier1
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tier1 + tier2 tests with coverage
        run: python -m pytest -m "tier1 or tier2" --timeout=60 --cov=dml_ts --cov-report=xml --cov-fail-under=70 -v

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30

  examples:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run examples
        run: |
          for f in examples/*.py; do
            python "$f"
          done
