name: Deploy web

# Deploys the Astro consumer at web/ to Cloudflare Workers + Static Assets
# via the reusable workflow at brandon-behring/deploy-workflows@v2.
#
# - push to main → production deploy (deploy-production job inside the
#   reusable workflow runs `wrangler deploy`).
# - pull_request → preview deploy via `wrangler versions upload` + PR
#   comment with the preview URL (deploy-preview job inside the reusable
#   workflow runs only when enable-pr-previews: true).
#
# Both paths run `npm run ci:validate` ahead of `npm run build` (strict —
# broken cite key, missing XRef, or duplicate anchor ID fails the
# workflow). v2 adoption deleted the inline preview block; previews now
# use the same validate-command as production, closing the latent
# bare-validate gap on the preview path that was flagged in the Phase 1d
# memory.

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'bibliography.bib'
      - '.github/workflows/deploy-web.yml'
  pull_request:
    branches: [main]
    paths:
      - 'web/**'
      - 'bibliography.bib'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: read
  deployments: write
  actions: read
  pull-requests: write   # required for enable-pr-previews (PR comment posting)

jobs:
  deploy:
    uses: brandon-behring/deploy-workflows/.github/workflows/deploy-astro-worker.yml@v2
    secrets: inherit
    with:
      working-directory: web
      # v4.6.0 migration (2026-05-27): reverted ci:validate → validate.
      # The book-scaffold-astro v4.6 release introduces the prevalidate
      # npm-lifecycle hook convention (see recipes/19-prevalidate-hook.md):
      # `npm run validate` now auto-runs the `prevalidate` hook first,
      # which regenerates references.json + labels.json. Combined with
      # tracking web/.env (BOOK_PROFILE=academic, non-sensitive) via the
      # `!web/.env` gitignore exception, validate picks up the academic
      # profile correctly in CI without explicit env prefixes.
      validate-command: validate
      enable-pr-previews: true
