repos:
  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        args: [--line-length=100]
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional, --explicit-package-bases]
        exclude: ^(test/|templates/)

  - repo: local
    hooks:
      # Run tier1 tests before commit (~12s, pure logic, no estimation)
      - id: unit-tests
        name: Run tier1 tests
        entry: bash -c 'source venv/bin/activate && python -m pytest -m tier1 --tb=short --no-cov -q || (echo "❌ Tier1 tests failed. Fix errors before committing."; exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Run tier1+tier2 tests on push (~2min, includes light estimation)
      - id: integration-test-suite
        name: Run tier1+tier2 tests
        entry: bash -c 'source venv/bin/activate && python -m pytest -m "tier1 or tier2" --tb=short --no-cov -q || (echo "❌ Tier1+tier2 tests failed. Fix errors before pushing."; exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Coverage check moved to CI/manual - running `make test-coverage` when needed
      # This avoids doubling test runtime on pre-push (was: ~30min coverage + ~30min full suite)

      # Validate template syntax
      - id: template-validation
        name: Validate Python templates
        entry: bash -c 'for f in templates/*.py; do python -m py_compile "$f" || exit 1; done; echo "✅ All templates valid"'
        language: system
        pass_filenames: false
        files: ^templates/.*\.py$

      # Large commit warning
      - id: large-commit-warning
        name: Large commit plan document check
        entry: bash -c 'LINES=$(git diff --cached --numstat | awk "{sum+=\$1} END {print sum}"); if [ "$LINES" -gt 500 ]; then echo "⚠️  Large commit detected ($LINES lines added). Plan document updated in docs/plans/active/?"; fi; exit 0'
        language: system
        always_run: true
        pass_filenames: false
