repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      # Local hooks run the venv's ruff so dev/CI/pre-commit share ONE pinned
      # version (the dev extra in pyproject.toml).
      - id: ruff-check
        name: ruff lint (autofix)
        entry: venv/bin/python -m ruff check --fix --exit-non-zero-on-fix dml_ts/ test/ examples/
        language: system
        pass_filenames: false
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: venv/bin/python -m ruff format dml_ts/ test/ examples/
        language: system
        pass_filenames: false
        types: [python]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional, --explicit-package-bases]
        exclude: ^(test/|templates/|scripts/)

  - repo: local
    hooks:
      # Run tier1 tests before commit (~12s, pure logic, no estimation)
      - id: unit-tests
        name: Run tier1 tests
        entry: bash -c 'venv/bin/python -m pytest -m tier1 --tb=short --no-cov -q || (echo "Tier1 tests failed. Fix errors before committing."; exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Run tier1+tier2 tests on push (~2min, includes light estimation)
      - id: integration-test-suite
        name: Run tier1+tier2 tests
        entry: bash -c 'venv/bin/python -m pytest -m "tier1 or tier2" --tb=short --no-cov -q || (echo "Tier1+tier2 tests failed. Fix errors before pushing."; exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Coverage check moved to CI/manual - running `make test-coverage` when needed
      # This avoids doubling test runtime on pre-push (was: ~30min coverage + ~30min full suite)

      # Validate template syntax
      - id: template-validation
        name: Validate Python templates
        entry: bash -c 'for f in templates/*.py; do venv/bin/python -m py_compile "$f" || exit 1; done; echo "All templates valid"'
        language: system
        pass_filenames: false
        files: ^templates/.*\.py$

      # Enforce LaTeX <-> MDX provenance: a chapters/*.tex change must be
      # accompanied by a re-stamped source_sha256 in its ported MDX (W3).
      - id: tex-mdx-drift-guard
        name: LaTeX <-> MDX drift guard
        entry: venv/bin/python scripts/check_tex_mdx_drift.py
        language: system
        pass_filenames: false
        files: ^(chapters/chapter_\d+\.tex|web/src/content/chapters/.*\.mdx)$
        stages: [pre-commit]

      # Large commit warning
      - id: large-commit-warning
        name: Large commit plan document check
        entry: bash -c 'LINES=$(git diff --cached --numstat | awk "{sum+=\$1} END {print sum}"); if [ "$LINES" -gt 500 ]; then echo "Large commit detected ($LINES lines added). Plan document updated in docs/plans/active/?"; fi; exit 0'
        language: system
        always_run: true
        pass_filenames: false
