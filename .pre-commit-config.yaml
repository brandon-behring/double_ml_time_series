repos:
  - repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
      - id: black
        args: [--line-length=100]
        language_version: python3

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --no-strict-optional, --explicit-package-bases]
        exclude: ^(test/|templates/)

  - repo: local
    hooks:
      # Run UNIT tests only before commit (instantiation, serialization, validation - no estimation)
      - id: unit-tests
        name: Run unit tests
        entry: bash -c 'source venv/bin/activate && python -m pytest test/validation/ -v --tb=short -m "unit" --no-cov || (echo "❌ Unit tests failed. Fix errors before committing."; exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-commit]

      # Run INTEGRATION tests on push (excludes slow Monte Carlo, ~10min instead of ~30min)
      # Slow tests run in CI or via `make test-all`
      - id: integration-test-suite
        name: Run integration tests (excludes slow)
        entry: bash -c 'source venv/bin/activate && python -m pytest test/validation/ -v --tb=short -m "not slow" || (echo "❌ Integration tests failed. Fix errors before pushing."; exit 1)'
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Coverage check moved to CI/manual - running `make test-coverage` when needed
      # This avoids doubling test runtime on pre-push (was: ~30min coverage + ~30min full suite)

      # Validate template syntax
      - id: template-validation
        name: Validate Python templates
        entry: bash -c 'for f in templates/*.py; do python -m py_compile "$f" || exit 1; done; echo "✅ All templates valid"'
        language: system
        pass_filenames: false
        files: ^templates/.*\.py$

      # Large commit warning
      - id: large-commit-warning
        name: Large commit plan document check
        entry: bash -c 'LINES=$(git diff --cached --numstat | awk "{sum+=\$1} END {print sum}"); if [ "$LINES" -gt 500 ]; then echo "⚠️  Large commit detected ($LINES lines added). Plan document updated in docs/plans/active/?"; fi; exit 0'
        language: system
        always_run: true
        pass_filenames: false
